<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>ALHASHMI للدبلجة والترجمة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a0a1a;color:#e0e0ff;min-height:100vh;overflow-x:hidden}

/* ✅ الخلفية - إصلاح الخط واللوقو */
.bg{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:100%;
  z-index:0;
  background:linear-gradient(135deg, #1a0533 0%, #0a0a1a 50%, #001233 100%);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  overflow:hidden;
}

.bg::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:100%;
  background-image: url('background.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  opacity: 0.6;
  z-index:1;
}

.wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1fr;gap:24px}
@media(min-width:1200px){.wrap{grid-template-columns:1fr 1fr 1fr;align-items:start}}
header{text-align:center;margin-bottom:32px;grid-column:1/-1}
.logo-container{display:flex;flex-direction:column;align-items:center;gap:12px}

/* ✅ اللوقو - إصلاح الظهور */
.logo-img{
  width:100px;
  height:100px;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(167,139,250,.4);
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  animation:logoFloat 3s ease-in-out infinite,logoGlow 2s ease-in-out infinite alternate;
  transition:transform .3s ease
}
.logo-img:hover{transform:scale(1.1) rotate(5deg)}
.logo-img img{
  width:100%;
  height:100%;
  object-fit:contain;
  filter:drop-shadow(0 0 10px rgba(167,139,250,.5));
  animation:logoPulse 2s ease-in-out infinite
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes logoGlow{0%{box-shadow:0 10px 40px rgba(167,139,250,.4)}100%{box-shadow:0 10px 60px rgba(167,139,250,.8),0 0 20px rgba(167,139,250,.6)}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 10px rgba(167,139,250,.5))}50%{filter:drop-shadow(0 0 20px rgba(167,139,250,.8))}}

.logo-container h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px}
.logo-container .subtitle{color:#a78bfa;font-size:.85rem;font-weight:600}
.logo-container .youtube-link{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.3);border-radius:20px;color:#ff4444;font-size:.75rem;font-weight:600;text-decoration:none;transition:all .3s;margin-top:8px}
.logo-container .youtube-link:hover{background:rgba(255,0,0,.2);border-color:rgba(255,0,0,.5);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,0,0,.3)}
.logo-container .youtube-link svg{width:18px;height:18px;fill:#ff4444}
.lang-switcher{position:fixed;top:20px;left:20px;z-index:1000}
.lang-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;color:#e0e0ff;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .3s;backdrop-filter:blur(10px)}
.lang-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:translateY(-2px)}
.lang-btn svg{width:20px;height:20px;fill:#e0e0ff}
.lang-dropdown{position:absolute;top:100%;left:0;margin-top:8px;background:rgba(255,255,255,.98);border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5);min-width:220px;overflow:hidden;transform:scale(0);transform-origin:top left;transition:all .3s;opacity:0}
.lang-dropdown.show{transform:scale(1);opacity:1}
.lang-option{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:all .2s;border-bottom:1px solid rgba(0,0,0,.05)}
.lang-option:last-child{border-bottom:none}
.lang-option:hover{background:rgba(167,139,250,.1)}
.lang-option.active{background:rgba(167,139,250,.2)}
.lang-flag{font-size:1.4rem;width:28px;text-align:center}
.lang-name{color:#1a0533;font-size:.85rem;font-weight:600}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.5);margin-bottom:16px}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.card-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;font-size:1rem}
.card-title{font-size:1rem;font-weight:700;color:#e0e0ff}
.lbl{font-size:.7rem;color:#a78bfa;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block}
.lg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:16px}
.lb{padding:10px 6px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#c4b5fd;cursor:pointer;font-size:.7rem;transition:all .2s;text-align:center;font-family:inherit}
.lb:hover{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4);transform:translateY(-2px)}
.lb.on{background:linear-gradient(135deg,rgba(167,139,250,.3),rgba(96,165,250,.3));border-color:#a78bfa;color:#fff;box-shadow:0 0 16px rgba(167,139,250,.3)}
.lf{font-size:1.2rem;display:block;margin-bottom:2px}
.lang-text{font-size:.7rem;display:block;margin-top:2px}
.tw{position:relative;margin-bottom:16px}
textarea{width:100%;min-height:120px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e0e0ff;font-size:.85rem;padding:12px;resize:vertical;font-family:inherit;transition:border-color .3s;outline:none;line-height:1.6}
textarea:focus{border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.12)}
textarea::placeholder{color:#4b5563}
.cc{position:absolute;bottom:8px;left:10px;font-size:.65rem;color:#4b5563}
.ctrls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.cg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:70px}
.cg label{font-size:.6rem;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,.1);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#60a5fa);cursor:pointer}
.rv{font-size:.65rem;color:#a78bfa;font-weight:600}
.br{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-size:.75rem;font-weight:600;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:5px}
.bs{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;flex:1;justify-content:center;box-shadow:0 4px 16px rgba(124,58,237,.4)}
.bs:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(124,58,237,.6)}
.bsm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#9ca3af}
.bsm:hover{background:rgba(255,255,255,.1)}
.st{text-align:center;font-size:.75rem;padding:8px;border-radius:8px;min-height:32px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .3s;margin-top:10px}
.st.i{color:#60a5fa;background:rgba(96,165,250,.07)}
.st.ok{color:#34d399;background:rgba(52,211,153,.07)}
.st.er{color:#f87171;background:rgba(248,113,113,.07)}
.st.wn{color:#fbbf24;background:rgba(251,191,36,.07)}
.ua{border:2px dashed rgba(96,165,250,.28);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;position:relative}
.ua:hover{border-color:rgba(96,165,250,.55);background:rgba(96,165,250,.04)}
.ua input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.ui{font-size:1.5rem;margin-bottom:4px}
.ut{color:#60a5fa;font-size:.75rem}
.us{color:#4b5563;font-size:.65rem;margin-top:2px}
.sl{max-height:220px;overflow-y:auto;margin-bottom:10px;scrollbar-width:thin;scrollbar-color:#a78bfa transparent}
.sl::-webkit-scrollbar{width:4px}
.sl::-webkit-scrollbar-thumb{background:#a78bfa;border-radius:4px}
.si{display:flex;gap:6px;padding:8px 10px;border-radius:8px;margin-bottom:4px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);align-items:flex-start;transition:all .15s}
.si.done{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3)}
.sin{color:#4b5563;font-size:.65rem;min-width:18px;padding-top:2px}
.sit{color:#60a5fa;font-size:.6rem;min-width:110px;padding-top:2px;font-family:monospace}
.sit2{color:#e0e0ff;font-size:.75rem;line-height:1.4;flex:1}
.gb{width:100%;padding:18px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#059669,#0d9488);box-shadow:0 6px 28px rgba(5,150,105,.45);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;font-family:inherit;position:relative;overflow:hidden;margin-bottom:0}
.gb:hover{transform:translateY(-3px);box-shadow:0 10px 38px rgba(5,150,105,.65)}
.gi{font-size:1.8rem}.gl{font-size:1rem;font-weight:800;color:#fff}.gs{font-size:.65rem;color:rgba(255,255,255,.7)}
.pw{margin-bottom:12px}
.pb{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:5px}
.pf{height:100%;background:linear-gradient(90deg,#7c3aed,#2563eb,#34d399);border-radius:3px;transition:width .4s ease}
.pm{display:flex;justify-content:space-between;font-size:.65rem;color:#6b7280;font-family:monospace}
.rb{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:14px;padding:16px;margin-top:12px}
.rt{color:#34d399;font-weight:700;font-size:.85rem;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.db{display:inline-flex;align-items:center;gap:5px;padding:10px 16px;background:linear-gradient(135deg,#059669,#0d9488);border-radius:10px;color:#fff;text-decoration:none;font-size:.8rem;font-weight:600;transition:all .2s;border:none;cursor:pointer;font-family:inherit;width:100%;justify-content:center}
.db:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(5,150,105,.4)}
.filters-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;margin-top:16px}
.fc-title{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:.85rem;font-weight:700;color:#e0e0ff}
.lbl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:12px}
.sbtn{padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);color:#9ca3af;cursor:pointer;font-size:.68rem;transition:all .2s;font-family:inherit}
.sbtn:hover{background:rgba(255,255,255,.06);color:#e0e0ff;border-color:rgba(167,139,250,.25)}
.tg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:14px}
.tbtn{padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#9ca3af;cursor:pointer;font-size:.7rem;transition:all .2s}
.tbtn:hover{background:rgba(52,211,153,.1);color:#34d399;border-color:#34d399}
.tbtn.on{background:#34d399;color:#000;font-weight:700}
.trs{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:14px;margin-top:14px}
.trh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.trt{color:#34d399;font-weight:700;font-size:.8rem}
.trc{font-size:.75rem;color:#d1d5db;line-height:1.5;white-space:pre-wrap;background:rgba(0,0,0,.2);padding:10px;border-radius:8px;max-height:250px;overflow-y:auto}
.ib{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.15);border-radius:10px;padding:12px;margin-bottom:14px}
.ir{display:flex;align-items:flex-start;gap:6px;font-size:.7rem;color:#9ca3af;line-height:1.4;margin-bottom:4px}
.ir:last-child{margin-bottom:0}
.ir strong{color:#60a5fa}
.cb{text-align:center;background:rgba(0,0,0,.35);border-radius:12px;padding:16px 12px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
.cr{display:flex;justify-content:center;gap:18px;margin-bottom:10px}
.ci{text-align:center}
.cl{font-size:.55rem;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.cv{font-size:1.2rem;font-weight:800;font-family:monospace;line-height:1}
.cr1{background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cr2{color:#34d399}.cr3{color:#4b5563}
.wv{display:flex;align-items:center;justify-content:center;gap:2px;height:28px;margin:10px 0;opacity:0;transition:opacity .3s}
.wv.on{opacity:1}
.wb{width:3px;border-radius:3px;background:linear-gradient(180deg,#a78bfa,#60a5fa);animation:wva 1.2s ease-in-out infinite}
.wb:nth-child(1){height:14px;animation-delay:0s}.wb:nth-child(2){height:22px;animation-delay:.1s}.wb:nth-child(3){height:28px;animation-delay:.2s}.wb:nth-child(4){height:22px;animation-delay:.3s}.wb:nth-child(5){height:14px;animation-delay:.4s}.wb:nth-child(6){height:26px;animation-delay:.5s}.wb:nth-child(7){height:18px;animation-delay:.6s}.wb:nth-child(8){height:28px;animation-delay:.7s}
@keyframes wva{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.ph{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:12px;font-size:.75rem}
.pd{width:6px;height:6px;border-radius:50%;background:#fbbf24;animation:blk 1s ease-in-out infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}
.pt{color:#fbbf24;font-weight:600}
footer{text-align:center;padding:16px;color:#374151;font-size:.7rem;grid-column:1/-1;border-top:1px solid rgba(255,255,255,.05);margin-top:24px}
.clean-box{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:14px;margin-top:14px}
.clean-title{color:#34d399;font-weight:700;font-size:.8rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.clean-output{background:rgba(0,0,0,.25);border-radius:8px;padding:10px;font-size:.75rem;color:#d1d5db;line-height:1.6;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-bottom:10px}
@media(max-width:1199px){.wrap{grid-template-columns:1fr}.card{margin-bottom:20px}}
@media(max-width:600px){h1{font-size:1.4rem}.lg{grid-template-columns:repeat(3,1fr)}.sit{display:none}.cr{gap:10px}.cv{font-size:1rem}.tg{grid-template-columns:1fr}.lb{padding:8px 4px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">

<div class="lang-switcher">
  <button class="lang-btn" onclick="toggleLang()" aria-label="Change language">
    <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
    <span id="currentLang">العربية</span>
    <svg viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
  </button>
  <div class="lang-dropdown" id="langDropdown" role="menu">
    <div class="lang-option active" onclick="setLang('ar')" data-lang="ar" role="menuitem">
      <span class="lang-flag">🇸🇦</span>
      <span class="lang-name">العربية</span>
    </div>
    <div class="lang-option" onclick="setLang('en')" data-lang="en" role="menuitem">
      <span class="lang-flag">🇺🇸</span>
      <span class="lang-name">English</span>
    </div>
    <div class="lang-option" onclick="setLang('ru')" data-lang="ru" role="menuitem">
      <span class="lang-flag">🇷🇺</span>
      <span class="lang-name">Русский</span>
    </div>
    <div class="lang-option" onclick="setLang('tr')" data-lang="tr" role="menuitem">
      <span class="lang-flag">🇹🇷</span>
      <span class="lang-name">Türkçe</span>
    </div>
    <div class="lang-option" onclick="setLang('fr')" data-lang="fr" role="menuitem">
      <span class="lang-flag">🇫🇷</span>
      <span class="lang-name">Français</span>
    </div>
    <div class="lang-option" onclick="setLang('de')" data-lang="de" role="menuitem">
      <span class="lang-flag">🇩🇪</span>
      <span class="lang-name">Deutsch</span>
    </div>
    <div class="lang-option" onclick="setLang('es')" data-lang="es" role="menuitem">
      <span class="lang-flag">🇪🇸</span>
      <span class="lang-name">Español</span>
    </div>
  </div>
</div>

<header>
  <div class="logo-container">
    <div class="logo-img">
      <!-- ✅ تأكد من اسم الملف الصحيح -->
      <img src="logo.png" alt="ALHASHMI Logo" id="siteLogo" loading="lazy" onerror="this.style.display='none'">
    </div>
    <div>
      <h1>ALHASHMI</h1>
      <p class="subtitle" data-i18n="subtitle">للدبلجة والترجمة الاحترافية</p>
      <a href="https://www.youtube.com/@-photosho" target="_blank" rel="noopener noreferrer" class="youtube-link" data-i18n="youtubeLink" title="Subscribe to the channel">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        <span data-i18n="subscribe">اشترك في القناة</span>
      </a>
    </div>
  </div>
</header>

<footer>ALHASHMI <span data-i18n="footer">للدبلجة والترجمة · GitHub + Render · gTTS · مجاني 100%</span></footer>
