<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - sl-Dubbing</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(167,139,250,.2);border-radius:24px;padding:50px;width:100%;max-width:480px;box-shadow:0 25px 80px rgba(0,0,0,.6)}
    .login-logo{text-align:center;margin-bottom:20px}
    .login-logo img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(167,139,250,.5))}
    .login-title{font-size:1.8rem;font-weight:900;color:white;text-align:center;margin-bottom:8px}
    .login-sub{color:#9ca3af;text-align:center;font-size:.95rem;margin-bottom:30px}
    .login-sub a{color:#60a5fa;text-decoration:none}
    .google-accounts{margin-bottom:25px;max-height:220px;overflow-y:auto;border:1px solid rgba(167,139,250,.1);border-radius:12px;background:rgba(0,0,0,.3)}
    .google-account-item{display:flex;align-items:center;gap:12px;padding:15px;cursor:pointer;border-bottom:1px solid rgba(167,139,250,.1);transition:all .3s}
    .google-account-item:last-child{border-bottom:none}
    .google-account-item:hover{background:rgba(167,139,250,.1)}
    .account-avatar{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#2563eb);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:white;flex-shrink:0}
    .account-name{font-weight:600;color:white;margin-bottom:3px}
    .account-email{font-size:.85rem;color:#9ca3af}
    .divider{display:flex;align-items:center;margin:25px 0;color:#6b7280}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(167,139,250,.2)}
    .divider span{padding:0 15px;font-size:.85rem}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-weight:600;color:white;font-size:.95rem;margin-bottom:8px}
    .form-group input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:white;font-size:.95rem;transition:all .3s;box-sizing:border-box}
    .form-group input:focus{outline:none;border-color:#a78bfa;background:rgba(167,139,250,.05);box-shadow:0 0 15px rgba(167,139,250,.2)}
    .form-group input::placeholder{color:#6b7280}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:10px;color:white;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(124,58,237,.4);margin-top:8px}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.6)}
    .login-links{display:flex;justify-content:space-between;align-items:center;margin-top:20px;font-size:.85rem}
    .login-links a{color:#60a5fa;text-decoration:none}
    .signup-link{text-align:center;margin-top:20px;font-size:.9rem;color:#9ca3af}
    .signup-link a{color:#60a5fa;text-decoration:none;font-weight:600}
    .back-link{text-align:center;margin-top:20px}
    .back-link a{color:#9ca3af;text-decoration:none;font-size:.9rem}
    .back-link a:hover{color:#a78bfa}
  </style>
</head>
<body>

<div class="bg"></div>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="logo.gif" onerror="this.src='logo.png'" alt="sl-Dubbing">
    </div>

    <h2 class="login-title">تسجيل الدخول</h2>
    <p class="login-sub">
      هل أنت مستخدم جديد؟
      <a href="#" onclick="showToast('التسجيل قريباً')">اضغط هنا للتسجيل</a>
    </p>

    <!-- حسابات Google -->
    <div class="google-accounts" id="googleAccounts"></div>

    <div class="divider"><span>أو</span></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="you@gmail.com" required>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="submit-btn">تسجيل الدخول</button>
    </form>

    <div class="login-links">
      <a href="#" onclick="showToast('استعادة كلمة المرور قريباً')">هل نسيت كلمة المرور؟</a>
      <label style="cursor:pointer;display:flex;align-items:center;gap:6px;color:#9ca3af">
        <input type="checkbox" id="rememberMe"> تذكرني
      </label>
    </div>

    <div class="signup-link">
      ليس لديك حساب؟
      <a href="#" onclick="showToast('التسجيل قريباً')">إنشاء حساب جديد</a>
    </div>

    <div class="back-link">
      <a href="index.html">← العودة للرئيسية</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── Toast ─── */
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), duration);
}

/* ─── حسابات Google ─── */
const GOOGLE_ACCOUNTS = [
  { name: 'Mona Alhil',      email: 'ahlil.ma@gmail.com',  initials: 'MA' },
  { name: 'ALHASHMI Design', email: 'abd199641@gmail.com',  initials: 'AD' },
  { name: 'Rhf Alhil',       email: 'rhfalhil@gmail.com',   initials: 'RA' },
];

function loadGoogleAccounts() {
  const container = document.getElementById('googleAccounts');
  container.innerHTML = GOOGLE_ACCOUNTS.map(a => `
    <div class="google-account-item" onclick="loginWithGoogle('${a.email}','${a.name}','${a.initials}')">
      <div class="account-avatar">${a.initials}</div>
      <div>
        <div class="account-name">${a.name}</div>
        <div class="account-email">${a.email}</div>
      </div>
    </div>
  `).join('');
}

function loginWithGoogle(email, name, initials) {
  showToast('جاري تسجيل الدخول...');
  const user = {
    email, name, avatar: initials,
    method: 'google',
    usage: { tts:0, dub:0, srt:0 },
    unlocked: { tts:false, dub:false, srt:false },
    timestamp: Date.now()
  };
  localStorage.setItem('sl_user', JSON.stringify(user));
  completeLogin(name);
}

function handleLogin(event) {
  event.preventDefault();
  const email    = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  showToast('جاري التحقق...');

  fetch('https://sl-dubbing.onrender.com/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
    signal: AbortSignal.timeout(8000)
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      const user = {
        email: data.email,
        name: data.email.split('@')[0],
        avatar: data.email[0].toUpperCase(),
        usage: data.usage || { tts:0, dub:0, srt:0 },
        unlocked: data.unlocked || { tts:false, dub:false, srt:false },
        timestamp: Date.now()
      };
      localStorage.setItem('sl_user', JSON.stringify(user));
      completeLogin(user.name);
    } else {
      showToast('❌ ' + (data.error || 'بيانات غير صحيحة'));
    }
  })
  .catch(() => {
    // وضع offline
    const user = {
      email, name: email.split('@')[0],
      avatar: email[0].toUpperCase(),
      method: 'email',
      usage: { tts:0, dub:0, srt:0 },
      unlocked: { tts:false, dub:false, srt:false },
      timestamp: Date.now()
    };
    localStorage.setItem('sl_user', JSON.stringify(user));
    completeLogin(user.name);
  });
}

function completeLogin(name) {
  showToast('مرحباً ' + name + '! 👋');
  const returnUrl = sessionStorage.getItem('returnUrl') || 'index.html';
  sessionStorage.removeItem('returnUrl');
  setTimeout(() => window.location.href = returnUrl, 1000);
}

/* ─── تشغيل ─── */
loadGoogleAccounts();
</script>

</body>
</html>
