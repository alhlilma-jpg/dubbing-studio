<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دبلجة AI - sl-Dubbing</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tool-header{display:flex;align-items:center;gap:15px;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .tool-header h1{font-size:2rem;font-weight:800;color:white}
    .back-btn{padding:10px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:var(--text-muted);text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s}
    .back-btn:hover{background:rgba(167,139,250,.1);color:white}
    .tool-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px}
    .lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px}
    .lang-btn{padding:12px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#c4b5fd;cursor:pointer;transition:all .2s;text-align:center;font-size:.85rem}
    .lang-btn:hover{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4);transform:translateY(-2px)}
    .lang-btn.active{background:linear-gradient(135deg,rgba(167,139,250,.3),rgba(96,165,250,.3));border-color:#a78bfa;color:#fff}
    .lang-flag{font-size:1.2rem;display:block;margin-bottom:4px}
    .ctrl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:20px}
    .ctrl{display:flex;flex-direction:column;gap:8px}
    .ctrl label{font-size:.9rem;color:var(--text-muted);font-weight:600}
    input[type=range]{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;-webkit-appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#60a5fa);cursor:pointer}
    .val{color:#a78bfa;font-weight:700}
    .upload-area{border:2px dashed rgba(96,165,250,.28);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:15px;background:rgba(96,165,250,.04)}
    .upload-area:hover{border-color:rgba(96,165,250,.55);background:rgba(96,165,250,.08)}
    .txt{width:100%;min-height:100px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e0e0ff;font-size:.9rem;padding:15px;resize:vertical;font-family:monospace;outline:none;margin-bottom:10px}
    .txt:focus{border-color:#a78bfa}
    .sec-btn{width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:var(--text-muted);cursor:pointer;font-weight:600;margin-bottom:20px;transition:all .3s}
    .sec-btn:hover{background:rgba(167,139,250,.1);color:white}
    .srt-list{max-height:280px;overflow-y:auto;margin:0 0 20px;padding:15px;background:rgba(0,0,0,.2);border-radius:12px;border:1px solid rgba(255,255,255,.05);display:none}
    .srt-item{padding:10px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:12px}
    .srt-item:last-child{border-bottom:none}
    .srt-time{color:#a78bfa;font-family:monospace;font-size:.8rem;min-width:110px}
    .srt-text{color:var(--text);flex:1;font-size:.88rem}
    .voice-box{background:rgba(124,58,237,.05);border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:20px;margin-bottom:20px}
    .voice-box h3{color:#a78bfa;margin-bottom:12px;font-size:1rem}
    .rec-btn{padding:12px 20px;background:linear-gradient(135deg,#dc2626,#ef4444);border:none;border-radius:10px;color:white;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:8px;transition:all .3s}
    .rec-btn:hover{transform:translateY(-2px)}
    .act-btn{width:100%;padding:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:12px;color:white;font-weight:700;font-size:1.1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(124,58,237,.4)}
    .act-btn:hover{transform:translateY(-2px)}
    .act-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .prog{display:none;margin:20px 0}
    .prog.on{display:block}
    .prog-bar{height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#34d399);border-radius:5px;transition:width .3s;width:0%}
    .prog-txt{text-align:center;margin-top:10px;color:#a78bfa;font-weight:600}
    audio{width:100%;margin:20px 0;display:none}
    audio.show{display:block}
    .dl-btn{width:100%;padding:14px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:10px;color:white;font-weight:700;cursor:pointer;text-decoration:none;display:none;align-items:center;justify-content:center;gap:8px;transition:all .3s}
    .dl-btn.show{display:flex}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">

  <header>
    <a class="logo-header" href="index.html">
      <img src="logo.gif" onerror="this.src='logo.png'" alt="sl-Dubbing" style="width:50px;height:50px;object-fit:contain">
      <span>sl-Dubbing & Translation</span>
    </a>
    <div class="user-info" id="headerUserZone">
      <a href="login.html" class="login-btn">تسجيل الدخول</a>
    </div>
  </header>

  <div class="tool-header">
    <a href="index.html" class="back-btn">← رجوع</a>
    <h1>🎬 دبلجة AI</h1>
  </div>

  <div class="tool-box">
    <label style="display:block;margin-bottom:10px;font-weight:600">اختر لغة الدبلجة:</label>
    <div class="lang-grid" id="langGrid"></div>

    <div class="ctrl-grid">
      <div class="ctrl">
        <label>السرعة: <span class="val" id="rateVal">1.0x</span></label>
        <input type="range" id="rate" min="0.5" max="1" step="0.05" value="1" oninput="rateVal.textContent=this.value+'x'">
      </div>
      <div class="ctrl">
        <label>الصوت: <span class="val" id="volVal">1.0x</span></label>
        <input type="range" id="vol" min="0.2" max="2" step="0.1" value="1" oninput="volVal.textContent=this.value+'x'">
      </div>
    </div>

    <label style="display:block;margin:0 0 10px;font-weight:600">ملف SRT:</label>
    <div class="upload-area" onclick="document.getElementById('srtFile').click()">
      <input type="file" id="srtFile" accept=".srt,.txt" style="display:none" onchange="uploadSRT(event)">
      <div style="font-size:3rem;margin-bottom:8px">📁</div>
      <div style="color:#60a5fa;font-weight:600">اسحب الملف هنا أو انقر للاختيار</div>
      <div style="color:var(--text-dim);font-size:.85rem;margin-top:4px">يدعم .srt و .txt</div>
    </div>

    <textarea class="txt" id="srtContent" placeholder="أو الصق محتوى SRT هنا..."></textarea>
    <button class="sec-btn" onclick="parseSRT()">📥 تحليل الملف</button>

    <div class="srt-list" id="srtList"></div>

    <div class="voice-box">
      <h3>🎙️ عينة الصوت (اختياري)</h3>
      <p style="color:var(--text-muted);font-size:.88rem;margin-bottom:12px">سجل 10-30 ثانية لنسخ نبرة صوتك</p>
      <button class="rec-btn" id="recBtn" onclick="toggleRec()">
        <span id="recIcon">🔴</span><span id="recTxt">بدء التسجيل</span>
      </button>
      <p id="recStatus" style="color:var(--text-muted);font-size:.85rem;margin-top:10px"></p>
    </div>

    <button class="act-btn" id="dubBtn" onclick="generateDub()">
      <span>🎬</span><span>توليد الدبلجة</span>
    </button>

    <div class="prog" id="prog">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-txt" id="progTxt">جاري توليد الدبلجة...</div>
    </div>

    <audio id="dubAudio" controls></audio>
    <a class="dl-btn" id="dlBtn" download="dubbed_audio.wav">⬇️ تحميل الدبلجة (WAV)</a>
  </div>

  <footer style="text-align:center;padding:40px 0 20px;color:var(--text-dim);font-size:.85rem;border-top:1px solid var(--border);margin-top:40px">
    <p>ALHASHMI © 2026 - جميع الحقوق محفوظة</p>
    <p style="margin-top:8px"><a href="privacy.html" style="color:var(--text-muted);text-decoration:none">سياسة الخصوصية</a></p>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const LANGS = [
  {code:'ar',name:'العربية',flag:'🇸🇦'},{code:'en',name:'English',flag:'🇺🇸'},
  {code:'es',name:'Español',flag:'🇪🇸'},{code:'fr',name:'Français',flag:'🇫🇷'},
  {code:'de',name:'Deutsch',flag:'🇩🇪'},{code:'it',name:'Italiano',flag:'🇮🇹'},
  {code:'ru',name:'Русский',flag:'🇷🇺'},{code:'tr',name:'Türkçe',flag:'🇹🇷'},
  {code:'zh',name:'中文',flag:'🇨🇳'},{code:'hi',name:'हिन्दी',flag:'🇮🇳'}
];

let selectedLang='ar', srtData=[], isRec=false, mediaRec=null, chunks=[];

function showToast(msg,d=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d);}

function init() {
  try {
    const user = JSON.parse(localStorage.getItem('sl_user'));
    if (!user) { sessionStorage.setItem('returnUrl',location.href); location.href='login.html'; return; }
    document.getElementById('headerUserZone').innerHTML = `
      <div class="user-avatar">${user.avatar||'👤'}</div>
      <span style="color:var(--text-muted);font-size:.9rem">${user.name||user.email}</span>
      <button class="logout-btn" onclick="localStorage.removeItem('sl_user');location.href='index.html'">خروج</button>`;
  } catch { sessionStorage.setItem('returnUrl',location.href); location.href='login.html'; return; }

  document.getElementById('langGrid').innerHTML = LANGS.map(l => `
    <button class="lang-btn ${l.code==='ar'?'active':''}" onclick="selectLang('${l.code}',this)">
      <span class="lang-flag">${l.flag}</span><span>${l.name}</span>
    </button>`).join('');
}

function selectLang(code,btn){selectedLang=code;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function uploadSRT(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('srtContent').value=ev.target.result;parseSRT();};r.readAsText(f);}

function parseSRT(){
  const c=document.getElementById('srtContent').value;
  if(!c){showToast('الرجاء إدخال محتوى SRT');return;}
  srtData=[];let cur=null;
  c.split('\n').forEach(l=>{l=l.trim();if(!l)return;if(/^\d+$/.test(l)){if(cur)srtData.push(cur);cur={index:+l,time:'',text:''};}else if(l.includes('-->')){if(cur)cur.time=l;}else{if(cur)cur.text+=l+' ';}});
  if(cur)srtData.push(cur);
  const list=document.getElementById('srtList');
  list.innerHTML=srtData.map(i=>`<div class="srt-item"><span class="srt-time">${i.time}</span><span class="srt-text">${i.text}</span></div>`).join('');
  list.style.display='block';
  showToast(`✅ تم تحليل ${srtData.length} جملة`);
}

async function toggleRec(){
  const btn=document.getElementById('recBtn'),icon=document.getElementById('recIcon'),txt=document.getElementById('recTxt'),status=document.getElementById('recStatus');
  if(!isRec){
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(s);chunks=[];
      mediaRec.ondataavailable=e=>chunks.push(e.data);
      mediaRec.onstop=()=>{window.recordedBlob=new Blob(chunks,{type:'audio/wav'});status.textContent='✅ تم حفظ التسجيل';};
      mediaRec.start();isRec=true;icon.textContent='⏹';txt.textContent='إيقاف التسجيل';status.textContent='⏺️ جاري التسجيل...';
    }catch{showToast('❌ لا يمكن الوصول للميكروفون');}
  }else{
    mediaRec.stop();mediaRec.stream.getTracks().forEach(t=>t.stop());
    isRec=false;icon.textContent='🔴';txt.textContent='بدء التسجيل';
  }
}

async function generateDub(){
  if(!srtData.length){showToast('الرجاء تحميل ملف SRT أولاً');return;}
  const btn=document.getElementById('dubBtn'),prog=document.getElementById('prog');
  btn.disabled=true;prog.classList.add('on');

  const user=JSON.parse(localStorage.getItem('sl_user')||'{}');
  try{
    const res=await fetch('https://sl-dubbing.onrender.com/api/dub',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:srtData.map(i=>i.text).join('\n'),lang:selectedLang,email:user.email,feature:'dub'}),
      signal:AbortSignal.timeout(30000)
    });
    const data=await res.json();
    if(data.success&&data.audio_url){
      prog.classList.remove('on');btn.disabled=false;
      const a=document.getElementById('dubAudio');a.src=data.audio_url;a.classList.add('show');
      const d=document.getElementById('dlBtn');d.href=data.audio_url;d.classList.add('show');
      showToast('✅ تم توليد الدبلجة!');return;
    }
  }catch{}

  // وضع المحاكاة
  let p=0;
  const iv=setInterval(()=>{
    p+=5;document.getElementById('progFill').style.width=p+'%';document.getElementById('progTxt').textContent=`جاري توليد الدبلجة... ${p}%`;
    if(p>=100){
      clearInterval(iv);prog.classList.remove('on');btn.disabled=false;
      document.getElementById('dubAudio').classList.add('show');
      document.getElementById('dlBtn').classList.add('show');
      showToast('✅ تم توليد الدبلجة (وضع المحاكاة)');
      try{const u=JSON.parse(localStorage.getItem('sl_user'));if(u){u.usage=u.usage||{};u.usage.dub=(u.usage.dub||0)+1;localStorage.setItem('sl_user',JSON.stringify(u));}}catch{}
    }
  },300);
}

init();
</script>
</body>
</html>
