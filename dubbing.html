<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دبلجة AI - sl-Dubbing</title>
<style>
/* ... جميع الأكواد السابقة ... */
</style>
</head>
<body>
<div class="page">
  <!-- ... جميع الأكواد السابقة ... -->
  <footer>
    <p>ALHASHMI © 2026</p>
    <p style="margin-top:8px"><a href="privacy.html">سياسة الخصوصية</a></p>
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
// ================================
// تعديل: رابط الخادم الجديد
// ================================
const BE = 'https://0475-34-124-191-219.ngrok-free.app';

// إذا كان لديك كود في script.js، تأكد أن المتغير BE معرف هناك أيضاً
// مثال توليد الدبلجة (يمكنك تعديله حسب كودك):
async function genDub() {
    const srtTxt = document.getElementById('srtTxt').value;
    const lang = window.selectedLang || 'ar';
    const voice_mode = window.selectedVoice || 'gtts';
    const dubBtn = document.getElementById('dubBtn');
    dubBtn.disabled = true;
    showToast('جاري توليد الدبلجة...');
    try {
        const res = await fetch(`${BE}/api/dub`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                text: srtTxt,
                lang: lang,
                voice_mode: voice_mode
            })
        });
        const data = await res.json();
        if (data.audio_url) {
            document.getElementById('dubAud').src = data.audio_url;
            document.getElementById('dubAud').classList.add('show');
            document.getElementById('dubDl').href = data.audio_url;
            document.getElementById('dubDl').classList.add('show');
            showToast('تم توليد الدبلجة بنجاح!');
        } else {
            showToast(data.error || 'حدث خطأ أثناء التوليد');
        }
    } catch(e) {
        showToast('تعذر الاتصال بالخادم');
    }
    dubBtn.disabled = false;
}

// اختيار الصوت
function selectVoice(mode, el) {
    window.selectedVoice = mode;
    document.querySelectorAll('.voice-choice').forEach(v => v.classList.remove('active'));
    el.classList.add('active');
}

// اختيار اللغة
function selectLang(lang, el) {
    window.selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
}

// رفع ملف SRT
function loadSRTFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('srtTxt').value = e.target.result;
    };
    reader.readAsText(file);
}

// Toast
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
