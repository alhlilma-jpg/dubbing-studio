<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دبلجة AI - sl-Dubbing</title>
  <style>
    :root{--border:rgba(255,255,255,.08);--text:#e0e0ff;--text-muted:#9ca3af;--text-dim:#6b7280}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1a0533 0%,#0a0a1a 50%,#001233 100%);color:var(--text);min-height:100vh}
    .wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;margin-bottom:24px}
    .logo-header{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:900;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
    .logo-header img{width:44px;height:44px;object-fit:contain}
    .user-info{display:flex;align-items:center;gap:10px}
    .login-btn{padding:10px 20px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:10px;color:white;cursor:pointer;font-weight:700;text-decoration:none;font-size:.9rem}
    .logout-btn{padding:8px 14px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#f87171;cursor:pointer;font-weight:600;font-size:.85rem}
    .user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#2563eb);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:.95rem}
    .tool-header{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
    .tool-header h1{font-size:1.7rem;font-weight:800;color:white}
    .back-btn{padding:9px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:#9ca3af;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .3s;font-size:.9rem}
    .back-btn:hover{background:rgba(167,139,250,.1);color:white}
    .box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;padding:28px}
    .lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:8px;margin-bottom:18px}
    .lang-btn{padding:10px 6px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#c4b5fd;cursor:pointer;text-align:center;font-size:.82rem;transition:all .2s}
    .lang-btn:hover{background:rgba(167,139,250,.15);transform:translateY(-2px)}
    .lang-btn.active{background:linear-gradient(135deg,rgba(167,139,250,.3),rgba(96,165,250,.3));border-color:#a78bfa;color:#fff}
    .lang-flag{font-size:1.1rem;display:block;margin-bottom:3px}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:18px}
    .cg{display:flex;flex-direction:column;gap:7px}
    .cg label{font-size:.88rem;color:#9ca3af;font-weight:600}
    .cg input[type=range]{width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;-webkit-appearance:none}
    .cg input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#60a5fa);cursor:pointer}
    .cv{color:#a78bfa;font-weight:700}
    .upload-area{border:2px dashed rgba(96,165,250,.3);border-radius:12px;padding:36px;text-align:center;cursor:pointer;margin-bottom:16px;background:rgba(96,165,250,.04);transition:all .2s}
    .upload-area:hover{border-color:rgba(96,165,250,.6);background:rgba(96,165,250,.08)}
    .upload-area input{display:none}
    .textarea{width:100%;min-height:90px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#e0e0ff;font-size:.88rem;padding:14px;resize:vertical;font-family:monospace;outline:none;margin-bottom:12px}
    .textarea:focus{border-color:#a78bfa}
    .sec-btn{padding:11px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.2);border-radius:10px;color:#9ca3af;cursor:pointer;font-weight:600;width:100%;margin-bottom:16px;transition:all .3s}
    .sec-btn:hover{background:rgba(167,139,250,.1);color:white}
    .srt-list{max-height:220px;overflow-y:auto;margin:0 0 16px;padding:12px;background:rgba(0,0,0,.2);border-radius:12px;border:1px solid rgba(255,255,255,.05);display:none}
    .srt-item{padding:9px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:10px;font-size:.82rem}
    .srt-time{color:#a78bfa;font-family:monospace;min-width:105px;flex-shrink:0}
    .voice-sec{background:rgba(124,58,237,.05);border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:18px;margin:16px 0}
    .voice-sec h3{color:#a78bfa;margin-bottom:10px;font-size:1rem}
    .rec-btn{padding:11px 18px;background:linear-gradient(135deg,#dc2626,#ef4444);border:none;border-radius:10px;color:white;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:7px;font-size:.9rem}
    .rec-btn.on{animation:rp 1.5s infinite}
    @keyframes rp{0%,100%{opacity:1}50%{opacity:.6}}
    .action-btn{padding:15px;background:linear-gradient(135deg,#7c3aed,#2563eb);border:none;border-radius:12px;color:white;cursor:pointer;font-weight:700;font-size:1rem;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(124,58,237,.4);transition:all .3s}
    .action-btn:hover{transform:translateY(-2px)}
    .action-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .prog-wrap{display:none;margin:18px 0}
    .prog-wrap.on{display:block}
    .prog-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#34d399);border-radius:4px;width:0%;transition:width .3s}
    .prog-txt{text-align:center;margin-top:8px;color:#a78bfa;font-weight:600;font-size:.9rem}
    audio{width:100%;margin:16px 0;display:none;border-radius:10px}
    audio.show{display:block}
    .dl-btn{padding:13px;background:linear-gradient(135deg,#059669,#10b981);border:none;border-radius:10px;color:white;font-weight:700;width:100%;display:none;align-items:center;justify-content:center;gap:8px;text-decoration:none;cursor:pointer;transition:all .3s}
    .dl-btn.show{display:flex}
    .dl-btn:hover{transform:translateY(-2px)}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;padding:14px 28px;border-radius:12px;font-weight:600;z-index:2000;transition:transform .3s;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    footer{text-align:center;padding:36px 0 18px;color:#6b7280;font-size:.82rem;border-top:1px solid rgba(255,255,255,.08);margin-top:50px}
    footer a{color:#9ca3af;text-decoration:none;margin:0 6px}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <a class="logo-header" href="index.html">
      <img src="logo.gif" onerror="this.src='logo.png'" alt="logo">
      sl-Dubbing & Translation
    </a>
    <div class="user-info" id="hdr">
      <a href="login.html" class="login-btn">تسجيل الدخول</a>
    </div>
  </header>

  <div class="tool-header">
    <a href="index.html" class="back-btn">← رجوع</a>
    <h1>🎬 دبلجة AI</h1>
  </div>

  <div class="box">
    <label style="display:block;margin-bottom:10px;font-weight:600">اختر لغة الدبلجة:</label>
    <div class="lang-grid" id="langs"></div>

    <div class="controls">
      <div class="cg"><label>السرعة: <span class="cv" id="rv">1.0x</span></label>
        <input type="range" id="rc" min=".5" max="1.5" step=".05" value="1" oninput="document.getElementById('rv').textContent=this.value+'x'"></div>
      <div class="cg"><label>الصوت: <span class="cv" id="vv">100%</span></label>
        <input type="range" id="vc" min="0" max="1" step=".1" value="1" oninput="document.getElementById('vv').textContent=Math.round(this.value*100)+'%'"></div>
    </div>

    <label style="display:block;margin-bottom:10px;font-weight:600">ملف SRT:</label>
    <div class="upload-area" onclick="document.getElementById('srtFile').click()">
      <input type="file" id="srtFile" accept=".srt,.txt" onchange="loadSRT(event)">
      <div style="font-size:2.5rem;margin-bottom:8px">📁</div>
      <div style="color:#60a5fa;font-weight:600">اسحب أو انقر للاختيار</div>
      <div style="color:#6b7280;font-size:.82rem;margin-top:4px">يدعم .srt و .txt</div>
    </div>
    <textarea class="textarea" id="srtTxt" placeholder="أو الصق محتوى SRT هنا..."></textarea>
    <button class="sec-btn" onclick="parseSRT()">📥 تحليل الملف</button>
    <div class="srt-list" id="srtList"></div>

    <div class="voice-sec">
      <h3>🎙️ عينة الصوت (اختياري)</h3>
      <p style="color:#9ca3af;font-size:.88rem;margin-bottom:12px">سجل 10-30 ثانية لنسخ نبرة صوتك</p>
      <button class="rec-btn" id="recBtn" onclick="toggleRec()">
        <span id="recIcon">🔴</span><span id="recTxt">بدء التسجيل</span>
      </button>
      <p id="recStatus" style="color:#9ca3af;font-size:.83rem;margin-top:10px;min-height:18px"></p>
    </div>

    <button class="action-btn" id="dubBtn" onclick="generateDub()">🎬 توليد الدبلجة</button>

    <div class="prog-wrap" id="progWrap">
      <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
      <div class="prog-txt" id="pt">جاري توليد الدبلجة...</div>
    </div>

    <audio id="dubAud" controls></audio>

    <!-- زر تحميل يشغّل الصوت محلياً -->
    <button class="dl-btn" id="dubDl" onclick="downloadAudio()">⬇️ تحميل الدبلجة (WAV)</button>
  </div>

  <footer>
    <p>ALHASHMI © 2026 - جميع الحقوق محفوظة</p>
    <p style="margin-top:8px">
      <a href="privacy.html">سياسة الخصوصية</a>
      <a href="https://www.youtube.com/@alhashmimh" target="_blank">YouTube</a>
    </p>
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
const LANGS=[
  {code:'ar',name:'العربية',flag:'🇸🇦',tts:'ar-SA'},
  {code:'en',name:'English',flag:'🇺🇸',tts:'en-US'},
  {code:'es',name:'Español',flag:'🇪🇸',tts:'es-ES'},
  {code:'fr',name:'Français',flag:'🇫🇷',tts:'fr-FR'},
  {code:'de',name:'Deutsch',flag:'🇩🇪',tts:'de-DE'},
  {code:'it',name:'Italiano',flag:'🇮🇹',tts:'it-IT'},
  {code:'ru',name:'Русский',flag:'🇷🇺',tts:'ru-RU'},
  {code:'tr',name:'Türkçe',flag:'🇹🇷',tts:'tr-TR'},
  {code:'zh',name:'中文',flag:'🇨🇳',tts:'zh-CN'},
  {code:'hi',name:'हिन्दी',flag:'🇮🇳',tts:'hi-IN'}
];

let lang='ar', ttsLang='ar-SA', srtData=[], isRec=false, rec=null, chunks=[];
let generatedBlob=null;
const BE='https://sl-dubbing.onrender.com';

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500)}

// ─── تحقق من تسجيل الدخول ───────────────────────
function getUser(){
  try{return JSON.parse(localStorage.getItem('sl_user'));}catch{return null;}
}

function init(){
  const u=getUser();
  if(!u){
    sessionStorage.setItem('returnUrl',location.href);
    location.href='login.html';
    return;
  }
  // Header
  document.getElementById('hdr').innerHTML=`
    <div class="user-avatar">${u.avatar||'👤'}</div>
    <span style="color:#9ca3af;font-size:.88rem">${u.name||u.email}</span>
    <button class="logout-btn" onclick="localStorage.removeItem('sl_user');location.href='index.html'">خروج</button>`;

  // اللغات
  document.getElementById('langs').innerHTML=LANGS.map(l=>`
    <button class="lang-btn ${l.code==='ar'?'active':''}" onclick="selLang('${l.code}','${l.tts}',this)">
      <span class="lang-flag">${l.flag}</span><span>${l.name}</span>
    </button>`).join('');
}

function selLang(c,t,b){
  lang=c; ttsLang=t;
  document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}

function loadSRT(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('srtTxt').value=ev.target.result;parseSRT();};
  r.readAsText(f,'UTF-8');
}

function parseSRT(){
  const content=document.getElementById('srtTxt').value;
  if(!content){showToast('الرجاء إدخال محتوى SRT');return;}
  srtData=[];let cur=null;
  for(let line of content.split('\n')){
    line=line.trim();if(!line)continue;
    if(/^\d+$/.test(line)){if(cur)srtData.push(cur);cur={index:parseInt(line),time:'',text:''};}
    else if(line.includes('-->')){if(cur)cur.time=line;}
    else{if(cur)cur.text+=line+' ';}
  }
  if(cur)srtData.push(cur);
  document.getElementById('srtList').innerHTML=srtData.map(i=>`
    <div class="srt-item">
      <span class="srt-time">${i.time}</span>
      <span style="flex:1">${i.text.trim()}</span>
    </div>`).join('');
  document.getElementById('srtList').style.display='block';
  showToast(`✅ تم تحليل ${srtData.length} جملة`);
}

async function toggleRec(){
  if(!isRec){
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      rec=new MediaRecorder(s);chunks=[];
      rec.ondataavailable=e=>chunks.push(e.data);
      rec.onstop=()=>{window.recBlob=new Blob(chunks,{type:'audio/wav'});document.getElementById('recStatus').textContent='✅ تم حفظ التسجيل';};
      rec.start();isRec=true;
      document.getElementById('recBtn').classList.add('on');
      document.getElementById('recIcon').textContent='⏹';
      document.getElementById('recTxt').textContent='إيقاف';
      document.getElementById('recStatus').textContent='⏺️ جاري التسجيل...';
    }catch{showToast('❌ لا يمكن الوصول للميكروفون');}
  }else{
    rec.stop();rec.stream.getTracks().forEach(t=>t.stop());isRec=false;
    document.getElementById('recBtn').classList.remove('on');
    document.getElementById('recIcon').textContent='🔴';
    document.getElementById('recTxt').textContent='بدء التسجيل';
  }
}

async function generateDub(){
  if(!srtData.length){showToast('الرجاء تحميل ملف SRT أولاً');return;}
  const btn=document.getElementById('dubBtn'),pw=document.getElementById('progWrap');
  btn.disabled=true;pw.classList.add('on');
  document.getElementById('pf').style.width='0%';

  // محاولة الخادم أولاً
  try{
    const res=await fetch(`${BE}/api/dub`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:srtData.map(i=>i.text).join('\n'),lang,email:getUser()?.email,feature:'dub'}),
      signal:AbortSignal.timeout(25000)
    });
    const data=await res.json();
    if(data.success&&data.audio_url){
      pw.classList.remove('on');btn.disabled=false;
      document.getElementById('dubAud').src=data.audio_url;
      document.getElementById('dubAud').classList.add('show');
      document.getElementById('dubDl').classList.add('show');
      showToast('✅ تم توليد الدبلجة!');
      return;
    }
  }catch{}

  // وضع محلي — نطق النص بالمتصفح وتسجيله
  showToast('⚡ جاري النطق المحلي...');
  await speakAndCapture();
  pw.classList.remove('on');
  btn.disabled=false;
}

// ─── نطق النص وتسجيله محلياً ─────────────────────
function speakAndCapture(){
  return new Promise(resolve=>{
    const fullText=srtData.map(i=>i.text.trim()).join(' ');
    const rate=parseFloat(document.getElementById('rc').value);
    const vol=parseFloat(document.getElementById('vc').value);

    // محاولة التسجيل عبر AudioContext
    try{
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const dest=ctx.createMediaStreamDestination();
      const mr=new MediaRecorder(dest.stream);
      const ch=[];
      mr.ondataavailable=e=>ch.push(e.data);
      mr.onstop=()=>{
        const blob=new Blob(ch,{type:'audio/webm'});
        generatedBlob=blob;
        const url=URL.createObjectURL(blob);
        document.getElementById('dubAud').src=url;
        document.getElementById('dubAud').classList.add('show');
        document.getElementById('dubDl').classList.add('show');
        showToast('✅ تم! اضغط تشغيل للاستماع');
        resolve();
      };
      mr.start();
      const u=new SpeechSynthesisUtterance(fullText);
      u.lang=ttsLang;u.rate=rate;u.volume=vol;
      u.onend=()=>{setTimeout(()=>{mr.stop();ctx.close();},500);};
      speechSynthesis.speak(u);
      // تقدم وهمي
      let p=0;const iv=setInterval(()=>{p=Math.min(p+3,90);document.getElementById('pf').style.width=p+'%';document.getElementById('pt').textContent=`جاري النطق... ${p}%`;if(p>=90)clearInterval(iv);},400);
    }catch{
      // fallback بدون تسجيل
      const u=new SpeechSynthesisUtterance(fullText);
      u.lang=ttsLang;u.rate=rate;u.volume=vol;
      let p=0;const iv=setInterval(()=>{p=Math.min(p+5,95);document.getElementById('pf').style.width=p+'%';document.getElementById('pt').textContent=`جاري النطق... ${p}%`;if(p>=95)clearInterval(iv);},300);
      u.onend=()=>{
        clearInterval(iv);
        document.getElementById('pf').style.width='100%';
        document.getElementById('dubAud').classList.add('show');
        document.getElementById('dubDl').classList.add('show');
        showToast('✅ تم النطق! (لا يمكن التسجيل في هذا المتصفح)');
        resolve();
      };
      speechSynthesis.speak(u);
    }
  });
}

function downloadAudio(){
  if(generatedBlob){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(generatedBlob);
    a.download='dubbed_audio.webm';
    a.click();
  }else{
    showToast('ليس هناك صوت للتحميل بعد');
  }
}

init();
</script>
</body>
</html>
