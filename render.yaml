services:
  - type: web
    name: sl-dubbing-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: PORT
        value: 5000
    disk:
      name: voices
      mountPath: /tmp
      sizeGB: 1
